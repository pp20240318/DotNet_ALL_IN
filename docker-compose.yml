services:
  mysql:
    image: mysql:8.0
    container_name: watchshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dotnet_all_in1
      MYSQL_USER: dotnet_all_in2
      MYSQL_PASSWORD: dotnet_all_in3
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: watchshop-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: watchshop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: watchshop-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: watchshop-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchshop-admin-api
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
      - elasticsearch
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"

  store-api:
    build:
      context: .
      dockerfile: Dockerfile.store
    container_name: watchshop-store-api
    depends_on:
      - mysql
      - redis
      - rabbitmq
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8081:8080"

volumes:
  mysql_data:
  minio_data:
  es_data:
